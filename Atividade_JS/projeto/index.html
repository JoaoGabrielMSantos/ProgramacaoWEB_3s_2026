<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Programas JavaScript</title>
</head>
<body>
    <h1>5 Programas JavaScript</h1>
    
    <button onclick="jogoAdivinhacao()">1. Jogo de Adivinhação</button>
    <button onclick="jogoPedraPapelTesoura()">2. Pedra, Papel ou Tesoura</button>
    <button onclick="tabuada()">3. Tabuada</button>
    <button onclick="trianguloAsteriscos()">4. Triângulo de Asteriscos</button>
    <button onclick="somaSerie()">5. Soma da Série</button>
    
    <p>  Abra o console do navegador para ver os resultados!</p>

    <script>
        // 1. Jogo de Adivinhação
        function jogoAdivinhacao() {
            console.log("=== JOGO DE ADIVINHAÇÃO ===");
            
            const numeroSecreto = Math.floor(Math.random() * 20) + 1;
            let tentativa;
            let acertou = false;
            
            console.log("Tente adivinhar o número secreto entre 1 e 20!");
            
            while (!acertou) {
                tentativa = parseInt(prompt("Digite seu palpite (1-20):"));
                
                if (tentativa === numeroSecreto) {
                    console.log("Parabéns! Você acertou!");
                    acertou = true;
                } else if (tentativa < numeroSecreto) {
                    console.log(tentativa + " - O número secreto é MAIOR!");
                } else {
                    console.log(tentativa + " - O número secreto é MENOR!");
                }
            }
        }

        // 2. Pedra, Papel ou Tesoura
        function jogoPedraPapelTesoura() {
            console.log("=== PEDRA, PAPEL OU TESOURA ===");
            
            const opcoes = ["pedra", "papel", "tesoura"];
            
            let escolhaUsuario = prompt("Escolha: pedra, papel ou tesoura").toLowerCase();
            
            while (!opcoes.includes(escolhaUsuario)) {
                escolhaUsuario = prompt("Opção inválida! Escolha: pedra, papel ou tesoura").toLowerCase();
            }
            
            const escolhaComputador = opcoes[Math.floor(Math.random() * 3)];
            
            console.log("Você escolheu: " + escolhaUsuario);
            console.log("Computador escolheu: " + escolhaComputador);
            
            if (escolhaUsuario === escolhaComputador) {
                console.log("Empate!");
            } else if (
                (escolhaUsuario === "pedra" && escolhaComputador === "tesoura") ||
                (escolhaUsuario === "papel" && escolhaComputador === "pedra") ||
                (escolhaUsuario === "tesoura" && escolhaComputador === "papel")
            ) {
                console.log("Você VENCEU!");
            } else {
                console.log("Você PERDEU!");
            }
        }

        // 3. Tabuada
        function tabuada() {
            console.log("=== TABUADA ===");
            
            const numero = parseInt(prompt("Digite um número para ver sua tabuada:"));
            
            if (isNaN(numero)) {
                console.log("Por favor, digite um número válido!");
                return;
            }
            
            console.log("Tabuada do " + numero + ":");
            console.log("=================");
            
            for (let i = 1; i <= 10; i++) {
                console.log(numero + " x " + i + " = " + (numero * i));
            }
        }

        // 4. Triângulo de Asteriscos
        function trianguloAsteriscos() {
            console.log("=== TRIÂNGULO DE ASTERISCOS ===");
            
            const linhas = parseInt(prompt("Digite o número de linhas do triângulo:"));
            
            if (isNaN(linhas) || linhas <= 0) {
                console.log("Por favor, digite um número válido maior que zero!");
                return;
            }
            
            console.log("");
            for (let i = 1; i <= linhas; i++) {
                let linha = "";
                for (let j = 1; j <= i; j++) {
                    linha += "*";
                }
                console.log(linha);
            }
        }

        // 5. Soma da Série
        function somaSerie() {
            console.log("=== SOMA DA SÉRIE (1 + 11 + 111 + ...) ===");
            
            const n = parseInt(prompt("Digite a quantidade de termos:"));
            
            if (isNaN(n) || n <= 0) {
                console.log("Por favor, digite um número válido maior que zero!");
                return;
            }
            
            let soma = 0;
            let termo = 0;
            let expressao = "";
            
            for (let i = 1; i <= n; i++) {
                termo = termo * 10 + 1;
                soma += termo;
                
                if (i === 1) {
                    expressao += termo;
                } else {
                    expressao += " + " + termo;
                }
            }
            
            console.log(expressao);
            console.log("A soma é: " + soma);
        }
    </script>
</body>
</html>
